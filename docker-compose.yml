version: "3.8"

services:
  temp-number:
    build: .
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      - NODE_ENV=production
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:9000/api/health', (r) => {if(r.statusCode!==200)process.exit(1);})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
